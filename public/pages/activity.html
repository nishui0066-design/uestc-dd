<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>活动结算 - 校搭联机版</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .activity-container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h2 { color: #333; margin-bottom: 20px; }
        .partner-info {
            background: #f5f7fa;
            padding: 20px;
            border-radius: 16px;
            margin: 20px 0;
        }
        .score-change {
            font-size: 48px;
            color: #5b78f5;
            margin: 20px 0;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .btn-win {
            flex: 1;
            background: #2ecc71;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
        }
        .btn-lose {
            flex: 1;
            background: #e74c3c;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
        }
        .btn-back {
            background: #95a5a6;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 12px;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="activity-container">
        <h2>🎉 活动结算</h2>
        <div class="partner-info">
            <p style="font-size: 18px;">对手：<strong id="partner-name">-</strong></p>
            <p>运动：<strong id="partner-sport">-</strong></p>
        </div>
        <div class="score-change">
            🏆 赢 +10分
        </div>
        <div class="btn-group">
            <button class="btn-win" onclick="recordWin()">我赢了 (+10)</button>
            <button class="btn-lose" onclick="recordLose()">结束活动</button>
        </div>
        <button class="btn-back" onclick="goBack()">← 返回</button>
    </div>

    <script>
        let me = null;
        let partner = null;
        
        window.onload = () => {
            const saved = localStorage.getItem("user");
            if (!saved) {
                window.location.href = "register.html";
                return;
            }
            me = JSON.parse(saved);
            
            const partnerData = localStorage.getItem("activityPartner");
            if (!partnerData) {
                alert("没有找到活动对手");
                window.location.href = "profile.html";
                return;
            }
            
            partner = JSON.parse(partnerData);
            document.getElementById("partner-name").innerText = partner.name;
            document.getElementById("partner-sport").innerText = me.currentSport || "未选择";
        };
        
        function recordWin() {
            const currentSport = me.currentSport;
            if (!currentSport) {
                alert("请先在个人中心设置当前运动");
                window.location.href = "profile.html";
                return;
            }
            
            // 赢家加分
            if (!me.scores[currentSport]) {
                me.scores[currentSport] = 50;
            }
            me.scores[currentSport] += 10;
            
            // 输家减分（需要从服务器获取对手信息并更新）
            fetch("/data")
                .then(r => r.json())
                .then(data => {
                    let loser = data.userProfiles.find(u => u.id === partner.id);
                    if (!loser) loser = data.onlineUsers.find(u => u.id === partner.id);
                    if (loser) {
                        if (!loser.scores[currentSport]) {
                            loser.scores[currentSport] = 50;
                        }
                        loser.scores[currentSport] -= 10;
                        
                        // 更新输家数据
                        fetch("/online", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(loser)
                        });
                    }
                });
            
            // 保存赢家
            localStorage.setItem("user", JSON.stringify(me));
            
            fetch("/online", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(me)
            });
            
            fetch("/history/add", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    winner: me.id,
                    loser: partner.id,
                    sport: currentSport,
                    winnerScoreChange: 10,
                    loserScoreChange: -10,
                    time: Date.now()
                })
            });
            
            alert(`🎉 恭喜获胜！${currentSport}积分 +10，对手 -10 分`);
            localStorage.removeItem("activityPartner");
            window.location.href = "profile.html";
        }
        function recordLose() {
            localStorage.removeItem("activityPartner");
            window.location.href = "profile.html";
        }
        
        function goBack() {
            localStorage.removeItem("activityPartner");
            window.location.href = "profile.html";
        }
    </script>
</body>
</html>
