<div style="background: white; padding: 10px 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; gap: 8px; justify-content: space-around; flex-wrap: wrap;">
    <a href="/square.html" style="text-decoration: none; padding: 8px 16px; border-radius: 25px; background: #f0f0f0; color: #333; font-weight: bold; text-align: center; flex: 1; position: relative;" id="nav-square">🏠 广场</a>
    <a href="/match.html" style="text-decoration: none; padding: 8px 16px; border-radius: 25px; background: #f0f0f0; color: #333; font-weight: bold; text-align: center; flex: 1; position: relative;" id="nav-match">💕 搭线</a>
    <a href="/party.html" style="text-decoration: none; padding: 8px 16px; border-radius: 25px; background: #f0f0f0; color: #333; font-weight: bold; text-align: center; flex: 1; position: relative;" id="nav-party">📢 约局</a>
    <a href="/groups.html" style="text-decoration: none; padding: 8px 16px; border-radius: 25px; background: #f0f0f0; color: #333; font-weight: bold; text-align: center; flex: 1; position: relative;" id="nav-groups">👥 群聊</a>
    <a href="/profile.html" style="text-decoration: none; padding: 8px 16px; border-radius: 25px; background: #f0f0f0; color: #333; font-weight: bold; text-align: center; flex: 1; position: relative;" id="nav-profile">👤 我的</a>
    <a href="/chat.html" style="text-decoration: none; padding: 8px 16px; border-radius: 25px; background: #f0f0f0; color: #333; font-weight: bold; text-align: center; flex: 1; position: relative;" id="nav-chat">💬 消息</a>
</div>

<style>
    .badge {
        position: absolute;
        top: -5px;
        right: -5px;
        background: #e74c3c;
        color: white;
        font-size: 10px;
        font-weight: bold;
        padding: 2px 6px;
        border-radius: 20px;
        min-width: 18px;
        text-align: center;
    }
</style>

<script>
    // 更新未读红点
    function updateUnreadBadges() {
        const userId = localStorage.getItem("userId") || 
                      (JSON.parse(localStorage.getItem("user") || '{}')?.id);
        if (!userId) return;
        
        // 获取私聊未读数
        fetch("/unread/private", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userId: userId })
        })
        .then(r => r.json())
        .then(data => {
            const chatBtn = document.getElementById("nav-chat");
            if (data.count > 0) {
                let badge = chatBtn.querySelector(".badge");
                if (!badge) {
                    badge = document.createElement("span");
                    badge.className = "badge";
                    chatBtn.appendChild(badge);
                }
                badge.textContent = data.count > 99 ? "99+" : data.count;
            } else {
                const badge = chatBtn.querySelector(".badge");
                if (badge) badge.remove();
            }
        });
        
        // 获取群聊未读数
        fetch("/unread/group", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userId: userId })
        })
        .then(r => r.json())
        .then(data => {
            const groupsBtn = document.getElementById("nav-groups");
            if (data.count > 0) {
                let badge = groupsBtn.querySelector(".badge");
                if (!badge) {
                    badge = document.createElement("span");
                    badge.className = "badge";
                    groupsBtn.appendChild(badge);
                }
                badge.textContent = data.count > 99 ? "99+" : data.count;
            } else {
                const badge = groupsBtn.querySelector(".badge");
                if (badge) badge.remove();
            }
        });
    }
    
    // 每5秒更新一次红点
    setInterval(updateUnreadBadges, 5000);
    setTimeout(updateUnreadBadges, 500);
</script>
