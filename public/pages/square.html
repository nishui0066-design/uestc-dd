<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#5b78f5">
    <title>广场 - 校搭联机</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { 
            background: linear-gradient(135deg, #f5f7fa, #e8eaf6); 
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px;
        }
        header { 
            text-align: center; 
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.8);
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        header h1 { 
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 8px;
        }
        header p { 
            color: #666;
            font-size: 1rem;
        }
        .filter-bar { 
            display: flex; 
            gap: 15px; 
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        .filter-bar select, .filter-bar button {
            padding: 12px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
        }
        .filter-bar select {
            min-width: 180px;
            background: #f8fafc;
        }
        .filter-bar button {
            background: #5b78f5;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(91, 120, 245, 0.3);
        }
        .filter-bar button:hover {
            background: #4c66d9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(91, 120, 245, 0.4);
        }
        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .card h4 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            color: #333;
        }
        .card p {
            margin-bottom: 12px;
            color: #666;
            line-height: 1.4;
        }
        .card button {
            margin-right: 10px;
            margin-top: 16px;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .card button:first-of-type {
            background: #5b78f5;
            color: white;
        }
        .card button:first-of-type:hover {
            background: #4c66d9;
        }
        .card button:last-of-type {
            background: #f1f5f9;
            color: #333;
        }
        .card button:last-of-type:hover {
            background: #e2e8f0;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 90%;
        }
        .modal-content h3 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        .modal-content p {
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .modal-content ul {
            margin-left: 20px;
            margin-bottom: 16px;
        }
        .modal-content li {
            margin-bottom: 6px;
        }
        .btn-lose {
            width: 100%;
            padding: 12px;
            background: #94a3b8;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-lose:hover {
            background: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <div id="nav-placeholder"></div>
        
        <!-- 页面标题 -->
        <header>
            <h1>🏠 广场</h1>
            <p>发现附近的运动搭子</p>
        </header>
        
    <!-- 邀请通知区域 -->
    <div id="invite-notice" style="background: #e8eaf6; border-radius: 12px; padding: 12px; margin-bottom: 15px; display: none;">
        <div id="invite-message"></div>
    </div>

        <!-- 筛选栏 -->
        <nav class="filter-bar">
            <select id="filter-sport">
                <option value="">所有运动</option>
                <option value="足球">足球</option>
                <option value="篮球">篮球</option>
                <option value="羽毛球">羽毛球</option>
                <option value="游泳">游泳</option>
                <option value="跑步">跑步</option>
                <option value="乒乓球">乒乓球</option>
                <option value="王者荣耀">王者荣耀</option>
                <option value="瓦罗兰特">瓦罗兰特</option>
                <option value="LOL">LOL</option>
                <option value="钢琴">钢琴</option>
                <option value="吉他">吉他</option>
                <option value="古筝">古筝</option>
            </select>
            <select id="filter-status">
                <option value="">所有状态</option>
                <option value="在线">在线</option>
                <option value="等待匹配">等待匹配</option>
                <option value="游戏中">游戏中</option>
                <option value="休息中">休息中</option>
            </select>
            <input type="text" id="user-search" placeholder="🔍 搜索用户" style="padding: 8px; border-radius: 25px; border: 1px solid #ddd; flex: 1; min-width: 150px;" onkeyup="searchUsers()">
            <button onclick="applyFilter()">🔍 筛选</button>
            <button onclick="refreshOnlineUsers()">🔄 刷新</button>
            <button onclick="smartMatch()">✨ 智能匹配</button>
        </nav>
        
        <!-- 用户列表 -->
        <div id="square" class="user-grid"></div>
    </div>
    
    <!-- 用户详情弹窗 -->
    <div id="user-detail-modal" class="modal">
        <div class="modal-content">
            <h3>📋 用户详情</h3>
            <div id="user-detail-content"></div>
            <button onclick="closeUserDetailModal()" class="btn-lose">关闭</button>
        </div>
    </div>
    
    <script>
        // 加载导航栏
        fetch('/pages/nav.html')
            .then(r => r.text())
            .then(html => document.getElementById('nav-placeholder').innerHTML = html);
        
        // 检查登录
        if (!localStorage.getItem("user")) {
            window.location.href = "register.html";
        }
    </script>
    <script src="../js/square.js"></script>
    <script>
    // 注册 Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW 注册成功', reg))
            .catch(err => console.log('SW 注册失败', err));
        }
    </script>
</body>
</html>
