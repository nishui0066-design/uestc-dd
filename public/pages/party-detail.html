<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>约局详情 - 校搭联机版</title>
    <link rel="stylesheet" href="../css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <style>
        body { background: #f5f7fa; }
        .detail-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .detail-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .sport-badge {
            display: inline-block;
            background: #5b78f5;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
        .status-recruiting { background: #2ecc71; color: white; }
        .status-ended { background: #95a5a6; color: white; }
        .info-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .info-label {
            width: 80px;
            color: #666;
        }
        .info-value {
            flex: 1;
            font-weight: 500;
        }
        .member-list {
            margin-top: 15px;
        }
        .member-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .member-avatar {
            width: 40px;
            height: 40px;
            background: #5b78f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            margin-right: 12px;
        }
        .member-name {
            flex: 1;
            font-weight: 500;
        }
        .member-role {
            font-size: 12px;
            color: #5b78f5;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn-primary {
            flex: 1;
            background: #5b78f5;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-danger {
            flex: 1;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-secondary {
            flex: 1;
            background: #95a5a6;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="detail-container">
        <button class="back-btn" onclick="goBack()">← 返回</button>
        
        <div id="party-detail">
            <div style="text-align:center;padding:50px;">加载中...</div>
        </div>
    </div>

    <script>
        let me = null;
        let party = null;
        
        // 获取URL参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        window.onload = () => {
            const saved = localStorage.getItem("user");
            if (!saved) {
                window.location.href = "register.html";
                return;
            }
            me = JSON.parse(saved);
            
            const partyId = getUrlParam("id");
            if (!partyId) {
                alert("约局ID不存在");
                goBack();
                return;
            }
            
            loadPartyDetail(partyId);
        };
        
        function loadPartyDetail(partyId) {
            fetch(`/api/party/${partyId}`)
                .then(r => r.json())
                .then(data => {
                    console.log("获取到的约局数据:", data);
                    party = data;
                    renderDetail();
                })
                .catch(err => {
                    console.error("加载失败:", err);
                    document.getElementById("party-detail").innerHTML = "<div style='text-align:center;padding:50px;color:#e74c3c'>加载失败，约局可能不存在</div>";
                });
        }
        
        function renderDetail() {
            const isJoined = party.players?.includes(me.id);
            const isCreator = party.creator === me.id;
            const isRecruiting = party.status === "招募中";
            
            const statusClass = party.status === "招募中" ? "status-recruiting" : "status-ended";
            
            const html = `
                <div class="detail-card">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
                        <span class="sport-badge">⚽ ${party.sport}</span>
                        <span class="status-badge ${statusClass}">${party.status}</span>
                    </div>
                    
                    <div class="info-row">
                        <div class="info-label">发起人</div>
                        <div class="info-value">${escapeHtml(party.creatorName)}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">地点</div>
                        <div class="info-value">📍 ${escapeHtml(party.location)}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">时间</div>
                        <div class="info-value">⏰ ${new Date(party.time).toLocaleString()}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">人数</div>
                        <div class="info-value">👥 ${party.players?.length || 0}/10 人</div>
                    </div>
                </div>
                
                <div class="detail-card">
                    <h3 style="margin:0 0 15px 0;">📋 报名成员 (${party.players?.length || 0})</h3>
                    <div class="member-list" id="member-list"></div>
                </div>
                
                <div class="action-buttons" id="action-buttons"></div>
            `;
            
            document.getElementById("party-detail").innerHTML = html;
            
            renderMembers();
            renderButtons(isJoined, isCreator, isRecruiting);
        }
        
        function renderMembers() {
            const container = document.getElementById("member-list");
            if (!container) return;
    
            let members = party.membersDetail;
            if (!members || members.length === 0) {
        // 从 players 数组构建临时成员列表
                members = party.players.map(pid => {
                    return { id: pid, name: pid === party.creator ? party.creatorName : "加载中..." };
                });
            }
    
            if (members.length === 0) {
                container.innerHTML = "<div style='text-align:center;color:#999;padding:20px'>暂无成员</div>";
                 return;
          }
    
            container.innerHTML = "";
            members.forEach(member => {
            const isCreator = member.id === party.creator;
            const div = document.createElement("div");
            div.className = "member-item";
            div.innerHTML = `
                <div class="member-avatar">${escapeHtml(member.name?.charAt(0) || "?")}</div>
                <div class="member-name">${escapeHtml(member.name)}</div>
                ${isCreator ? '<div class="member-role">发起人</div>' : ''}
             `;
            container.appendChild(div);
        });
    }
        
        function renderButtons(isJoined, isCreator, isRecruiting) {
            const container = document.getElementById("action-buttons");
            if (!container) return;
            
            if (isCreator) {
                container.innerHTML = `
                    <button class="btn-danger" onclick="cancelParty()">取消约局</button>
                    <button class="btn-secondary" onclick="goBack()">返回</button>
                `;
            } else if (isJoined) {
                container.innerHTML = `
                    <button class="btn-danger" onclick="leaveParty()">退出约局</button>
                    <button class="btn-secondary" onclick="goBack()">返回</button>
                `;
            } else if (isRecruiting) {
                container.innerHTML = `
                    <button class="btn-primary" onclick="joinParty()">报名参加</button>
                    <button class="btn-secondary" onclick="goBack()">返回</button>
                `;
            } else {
                container.innerHTML = `
                    <button class="btn-secondary" onclick="goBack()">返回</button>
                `;
            }
        }
        
        function joinParty() {
            fetch("/party/join", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ partyId: party.id, userId: me.id, userName: me.name })
            }).then(() => {
                alert("报名成功！");
                loadPartyDetail(party.id);
            });
        }
        
        function leaveParty() {
            if (confirm("确定要退出这个约局吗？")) {
                fetch("/party/leave", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ partyId: party.id, userId: me.id })
                }).then(() => {
                    alert("已退出约局");
                    goBack();
                });
            }
        }
        
        function cancelParty() {
            if (confirm("确定要取消这个约局吗？取消后无法恢复！")) {
                fetch("/party/cancel", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ partyId: party.id, userId: me.id })
                }).then(() => {
                    alert("约局已取消");
                    goBack();
                });
            }
        }
        
        function goBack() {
            window.location.href = "party.html";
        }
        
        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
