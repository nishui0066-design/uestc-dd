<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校搭 v3.0 - 真实多人联机版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤝 校搭 (Campus Match) v3.0 联机版</h1>
            <p>真实用户匹配 · 实时聊天 · 同一WiFi互联</p>
        </header>

        <!-- 个人信息 -->
        <section class="panel" id="user-info-panel" style="display: none;">
            <h3>👤 我的信息</h3>
            <div class="info-row">
                <p><strong>昵称：</strong><span id="info-name">-</span></p>
                <p><strong>性别：</strong><span id="info-gender">-</span></p>
                <p><strong>段位：</strong><span id="info-rank">-</span></p>
                <p><strong>积分：</strong><span id="info-score">-</span></p>
                <p><strong>当前状态：</strong><span id="info-status">未设置</span> <button onclick="openStatusModal()" style="font-size:12px;padding:2px 8px;">设置</button></p>
                <p><button onclick="showHistory()" style="font-size:12px;padding:2px 8px;margin-top:8px;">📜 活动记录</button></p>
                <p><button onclick="openEditProfile()" style="font-size:12px;padding:2px 8px;">✏️ 编辑资料</button></p>
            </div>
        </section>

        

        <section class="my-status">
            <div class="status-box">
                <h4>🔔 我的邀请 (<span id="req-count">0</span>)</h4>
                <div id="incoming-requests"></div>
            </div>
            <div class="status-box">
                <h4>✅ 我的搭子</h4>
                <div id="matched-list"></div>
            </div>
        </section>

        <nav class="filter-bar">
    <select id="filter-sport">
        <option value="">所有运动</option>
        <option value="足球">足球</option>
        <option value="篮球">篮球</option>
        <option value="羽毛球">羽毛球</option>
        <option value="游泳">游泳</option>
        <option value="王者荣耀">王者荣耀</option>
        <option value="瓦罗兰特">瓦罗兰特</option>
        <option value="LOL">LOL</option>
        <option value="钢琴">钢琴</option>
        <option value="吉他">吉他</option>
        <option value="古筝">古筝</option>
    </select>
    <select id="filter-status">
        <option value="">所有状态</option>
        <option value="在线">在线</option>
        <option value="等待匹配">等待匹配</option>
        <option value="游戏中">游戏中</option>
        <option value="休息中">休息中</option>
    </select>
    <button onclick="applyFilter()">筛选</button>
    <button onclick="refreshOnlineUsers()">刷新在线用户</button>
    <button onclick="smartMatch()">✨ 智能匹配</button>
</nav>
<div id="square" class="user-grid"></div>

    <!-- 活动结算 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>🎉 活动结算</h3>
            <p>对手：<span id="partner-name"></span></p>
            <p>赢+10分，输不扣分</p>
            <div class="modal-btns">
                <button onclick="closeModal(true)" class="btn-win">我赢了(+10)</button>
                <button onclick="closeModal(false)" class="btn-lose">结束</button>
            </div>
        </div>
    </div>

        <!-- 真实聊天弹窗 -->
    <div id="chat-modal" class="modal">
        <div class="modal-content" style="width:400px;">
            <h3>💬 与 <span id="chat-partner-name"></span> 聊天</h3>
            <div id="chat-history" style="height:200px;overflow-y:auto;border:1px solid #eee;border-radius:8px;padding:10px;margin:10px 0;text-align:left"></div>
            <div style="display:flex;gap:10px;">
                <input type="text" id="chat-input" placeholder="输入消息..." style="flex:1;padding:8px;">
                <button onclick="sendRealChat()" class="btn-main">发送</button>
            </div>
            <button onclick="closeChatModal()" style="margin-top:10px">关闭</button>
        </div>
    </div>

    <div id="user-detail-modal" class="modal">
        <div class="modal-content" style="width:350px;">
            <h3>📋 用户详情</h3>
            <div id="user-detail-content" style="text-align:left;margin:15px 0;"></div>
            <button onclick="closeUserDetailModal()" class="btn-lose">关闭</button>
        </div>
    </div>

    <script>
        if (!localStorage.getItem("user")) {
            window.location.href = "register.html";
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
