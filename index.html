<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校搭 v3.0 - 真实多人联机版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤝 校搭 (Campus Match) v3.0 联机版</h1>
            <p>真实用户匹配 · 实时聊天 · 同一WiFi互联</p>
        </header>

        <!-- 个人信息 -->
        <section class="panel" id="user-info-panel" style="display: none;">
            <h3>👤 我的信息</h3>
            <div class="info-row">
                <p><strong>昵称：</strong><span id="info-name">-</span></p>
                <p><strong>性别：</strong><span id="info-gender">-</span></p>
                <p><strong>类别：</strong><span id="info-category">-</span></p>
                <p><strong>积分：</strong><span id="info-score">-</span></p>
            </div>
        </section>

        <section class="panel">
            <h3>📇 完善个人名片</h3>
            <div class="form-row">
                <input type="text" id="username" placeholder="昵称">
                <select id="gender">
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
                <select id="mainCat" onchange="updateSub()">
                    <option value="">大类</option>
                    <option value="运动">运动</option>
                    <option value="游戏">游戏</option>
                    <option value="乐器">乐器</option>
                </select>
                <select id="subCat" disabled><option>小类</option></select>
                <button onclick="register()" class="btn-main">进入校园广场</button>
            </div>
        </section>

        <section class="my-status">
            <div class="status-box">
                <h4>🔔 我的邀请 (<span id="req-count">0</span>)</h4>
                <div id="incoming-requests"></div>
            </div>
            <div class="status-box">
                <h4>✅ 我的搭子</h4>
                <div id="matched-list"></div>
            </div>
        </section>

        <nav class="filter-bar">
            <button onclick="refreshOnlineUsers()">刷新在线用户</button>
            <button onclick="smartMatch()">✨ 智能匹配</button>
        </nav>

        <div id="square" class="user-grid"></div>
    </div>

    <!-- 活动结算 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>🎉 活动结算</h3>
            <p>对手：<span id="partner-name"></span></p>
            <p>赢+10分，输不扣分</p>
            <div class="modal-btns">
                <button onclick="closeModal(true)" class="btn-win">我赢了(+10)</button>
                <button onclick="closeModal(false)" class="btn-lose">结束</button>
            </div>
        </div>
    </div>

    <!-- 真实聊天弹窗 -->
    <div id="chat-modal" class="modal">
        <div class="modal-content" style="width:400px;">
            <h3>💬 与 <span id="chat-partner-name"></span> 聊天</h3>
            <div id="chat-history" style="height:200px;overflow-y:auto;border:1px solid #eee;border-radius:8px;padding:10px;margin:10px 0;text-align:left"></div>
            <div style="display:flex;gap:10px;">
                <input type="text" id="chat-input" placeholder="输入消息..." style="flex:1;padding:8px;">
                <button onclick="sendRealChat()" class="btn-main">发送</button>
            </div>
            <button onclick="closeChatModal()" style="margin-top:10px">关闭</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
